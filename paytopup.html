<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pembayaran Top Up</title>
  <link rel="icon" type="image/jpeg" href="/media/logo.jpg">
  <link rel="apple-touch-icon" sizes="180x180" href="/media/icon.jpg">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#181818;--bg1:#1a1a1a;--bg2:#212121;--bg3:#2a2a2a;
      --line:#2E2E2E;--line2:#3a3a3a;
      --em:#34d399;--em-rgb:52,211,153;--em2:#6ee7b7;
      --red:#f87171;--yellow:#fbbf24;
      --t1:#e5e5e5;--t2:#a0a0a0;--t3:#616161;
      --font:'DM Sans',system-ui,sans-serif;
      --rad:10px;--rs:6px;
    }
    html,body{min-height:100vh;background:var(--bg);color:var(--t1);font-family:var(--font);font-size:13.5px;letter-spacing:-.3px}
    body{display:flex;flex-direction:column;align-items:center;padding:.5rem 1rem 3rem}

    @keyframes dotPulse{0%,80%,100%{opacity:.15;transform:scale(.75)}40%{opacity:1;transform:scale(1)}}
    .spin{display:inline-flex;gap:2.5px;align-items:center;vertical-align:middle}
    .spin>span{width:4px;height:4px;border-radius:50%;background:currentColor;animation:dotPulse 1.1s ease-in-out infinite}
    .spin>span:nth-child(2){animation-delay:.18s}
    .spin>span:nth-child(3){animation-delay:.36s}

    @keyframes pulse-ring{0%{transform:scale(1);opacity:.7}100%{transform:scale(2.8);opacity:0}}
    @keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

    .back-btn{display:inline-flex;align-items:center;gap:.35rem;font-size:.68rem;color:var(--t3);text-decoration:none;padding:.5rem 0;margin-bottom:.5rem;transition:color .15s;align-self:flex-start;width:100%;max-width:480px}
    .back-btn:hover{color:var(--t1)}
    .back-btn svg{width:14px;height:14px}

    .card{width:100%;max-width:480px;background:var(--bg1);border:1px solid var(--line2);border-radius:var(--rad);overflow:visible;box-shadow:0 0 0 1px rgba(255,255,255,.03),0 8px 24px rgba(0,0,0,.5);animation:fadein .35s ease forwards}
    .c-head{padding:1rem 1.25rem;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:.75rem;border-radius:var(--rad) var(--rad) 0 0;overflow:hidden}
    .c-head-icon{width:36px;height:36px;border-radius:4px;flex-shrink:0;background:var(--bg2);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center}
    .c-head-icon svg{width:16px;height:16px;color:var(--em)}
    .c-prod{font-size:.82rem;font-weight:700;color:var(--t1)}
    .c-sub{font-size:.65rem;color:var(--t3)}
    .c-body{padding:1.25rem}
    .c-foot{padding:.75rem 1.25rem;text-align:center;font-size:.58rem;color:var(--t3);border-top:1px solid var(--line)}

    /* QR */
    .qr-section{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rs);padding:1.25rem;text-align:center;margin-bottom:1rem}
    .qr-badge-row{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:1rem}
    .qr-badge{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.18rem .6rem;border-radius:4px;background:rgba(var(--em-rgb),.1);border:1px solid rgba(var(--em-rgb),.25);color:var(--em)}
    .qr-dot{width:4px;height:4px;border-radius:50%;background:var(--line2)}
    .qr-canvas-bg{background:#fff;border-radius:4px;padding:12px;display:inline-block;box-shadow:0 0 0 1px rgba(255,255,255,.08),0 8px 24px rgba(0,0,0,.4)}
    .qr-loader{width:200px;height:200px;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:.65rem}
    .qr-canvas-bg img{display:block;width:200px;height:200px;border-radius:4px;image-rendering:pixelated}
    .amt-label{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin:.75rem 0 .2rem}
    .amt-row{display:flex;align-items:baseline;justify-content:center;gap:.2rem}
    .amt-rp{font-size:1rem;color:var(--t3)}
    .amt-num{font-size:2.2rem;font-weight:400;letter-spacing:-.02em;color:var(--t1);line-height:1}
    .fee-info{font-size:.6rem;color:var(--t3);margin-top:.3rem}
    .variant-badge{display:inline-block;margin-top:.5rem;font-size:.62rem;font-weight:600;padding:.2rem .65rem;border-radius:4px;background:rgba(var(--em-rgb),.08);border:1px solid rgba(var(--em-rgb),.18);color:var(--em2)}

    /* status */
    .status-wrap{margin-bottom:.75rem}
    .status-row{display:flex;align-items:center;gap:.6rem;background:var(--bg2);border:1px solid var(--line);border-radius:var(--rs);padding:.65rem .85rem}
    .s-pulse{position:relative;width:8px;height:8px;flex-shrink:0}
    .s-pulse span{position:absolute;inset:0;border-radius:50%}
    .s-core{background:var(--em)}
    .s-ring{background:var(--em);animation:pulse-ring 1.6s ease-in-out infinite}
    .s-pulse.ok .s-ring{animation:none}
    .s-pulse.processing .s-core,.s-pulse.processing .s-ring{background:var(--yellow)}
    .s-pulse.processing .s-ring{animation:pulse-ring 1.2s ease-in-out infinite}
    .s-pulse.fail .s-core,.s-pulse.fail .s-ring{background:var(--red)}
    .s-pulse.fail .s-ring{animation:none}
    .s-pulse.dim .s-core,.s-pulse.dim .s-ring{background:var(--t3)}
    .s-pulse.dim .s-ring{animation:none}
    .s-txt{font-size:.72rem;font-weight:600;color:var(--t2)}
    .s-txt.ok{color:var(--em)}.s-txt.fail{color:var(--red)}.s-txt.proc{color:var(--yellow)}
    .timer-bar{display:flex;justify-content:space-between;align-items:center;padding:.35rem .05rem 0;font-size:.6rem;color:var(--t3)}
    .timer-val{font-weight:700;font-variant-numeric:tabular-nums;color:var(--t2);transition:color .3s}
    .timer-val.warn{color:var(--yellow)}.timer-val.red{color:var(--red)}

    /* success */
    .success-box{margin-bottom:.75rem;display:none}
    .suc-inner{padding:.75rem;background:rgba(var(--em-rgb),.06);border:1px solid rgba(var(--em-rgb),.18);border-radius:6px}
    .suc-title{font-size:.65rem;font-weight:700;color:var(--em);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem;display:flex;align-items:center;gap:.4rem}
    .suc-row{display:flex;justify-content:space-between;align-items:center;padding:.3rem 0;border-bottom:1px solid rgba(var(--em-rgb),.1);font-size:.68rem}
    .suc-row:last-child{border-bottom:none}
    .suc-row span:first-child{color:var(--t3)}
    .suc-row span:last-child{color:var(--t1);font-weight:600;text-align:right;max-width:65%;word-break:break-all}

    /* error */
    .dep-err{font-size:.65rem;color:var(--red);margin-bottom:.75rem;display:none;padding:.45rem .7rem;background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.18);border-radius:4px}

    /* actions */
    .dep-actions-row{display:flex;gap:.5rem;margin-top:.35rem}
    .dep-check-btn{flex:0 0 auto;display:flex;align-items:center;gap:.35rem;padding:.52rem .85rem;background:var(--bg3);border:1px solid var(--line2);border-radius:var(--rs);font-family:var(--font);font-size:.65rem;font-weight:600;color:var(--t2);cursor:pointer;transition:all .18s}
    .dep-check-btn:hover:not(:disabled){border-color:rgba(var(--em-rgb),.35);color:var(--em)}
    .dep-check-btn:disabled{opacity:.5;cursor:not-allowed}
    .cancel-btn{flex:1;background:none;border:1px solid var(--line);border-radius:var(--rs);padding:.52rem;font-family:var(--font);font-size:.65rem;font-weight:600;color:var(--t3);cursor:pointer;transition:all .18s}
    .cancel-btn:hover:not(:disabled){border-color:rgba(248,113,113,.3);color:var(--red)}
    .back-to-topup-btn{width:100%;margin-top:.5rem;background:rgba(var(--em-rgb),.08);border:1px solid rgba(var(--em-rgb),.25);border-radius:var(--rs);padding:.6rem;font-family:var(--font);font-size:.72rem;font-weight:700;color:var(--em);cursor:pointer;transition:all .18s;display:none}
    .back-to-topup-btn:hover{background:rgba(var(--em-rgb),.14)}

    /* loading skeleton */
    .skel{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:4px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* notif */
    @keyframes slideUp{from{opacity:0;transform:translateY(12px)translate(-50%)}to{opacity:1;transform:translateY(0)translate(-50%)}}
    .notif{position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%);min-width:200px;max-width:320px;background:var(--bg3);border:1px solid var(--line2);border-radius:8px;padding:.6rem .9rem;display:flex;align-items:center;gap:.55rem;font-size:.72rem;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .25s;z-index:999}
    .notif.show{opacity:1;pointer-events:auto;animation:slideUp .25s ease}
    .notif.ok .n-icon{color:var(--em)}.notif.err .n-icon{color:var(--red)}.notif.info .n-icon{color:#38bdf8}
    .n-icon{width:14px;height:14px;flex-shrink:0}
    .n-msg{flex:1}

    /* music player — sama persis dengan payotp.html */
    #musicPlayer{position:fixed;bottom:1.15rem;right:1.15rem;z-index:300;display:none;flex-direction:column;align-items:flex-end;gap:.38rem}
    #musicPanel{background:var(--bg2);border:1px solid var(--line2);border-radius:4px;box-shadow:0 6px 28px rgba(0,0,0,.6);width:196px;padding:.65rem .8rem;display:none;flex-direction:column;gap:.5rem}
    #musicPanel.open{display:flex;animation:mpUp .16s ease}
    @keyframes mpUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    .mp-title{font-size:.62rem;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.02em}
    .mp-controls{display:flex;align-items:center;justify-content:center;gap:.4rem}
    .mp-nav{width:28px;height:28px;border-radius:4px;border:1px solid var(--line2);background:var(--bg3);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
    .mp-nav:hover{border-color:var(--line3,#484848);color:var(--t1)}
    .mp-nav svg{width:12px;height:12px;display:block}
    .mp-vol-row{display:flex;align-items:center;gap:.45rem}
    .mp-vol-ico{color:var(--t3);flex-shrink:0}
    .mp-vol-ico svg{width:12px;height:12px;display:block}
    .mp-vol-sl{flex:1;-webkit-appearance:none;appearance:none;height:2px;border-radius:2px;background:var(--line2);cursor:pointer;outline:none}
    .mp-vol-sl::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--em);cursor:pointer}
    .mp-vol-sl::-moz-range-thumb{width:11px;height:11px;border-radius:50%;border:none;background:var(--em);cursor:pointer}
    .mp-eq{display:none;align-items:flex-end;gap:2px;height:15px;width:15px;justify-content:center}
    .mp-eq span{width:2px;background:var(--em);border-radius:1px;animation:mpEq .75s ease-in-out infinite}
    .mp-eq span:nth-child(1){animation-duration:.65s}
    .mp-eq span:nth-child(2){animation-duration:.9s;animation-delay:.13s}
    .mp-eq span:nth-child(3){animation-duration:.6s;animation-delay:.27s}
    .mp-eq span:nth-child(4){animation-duration:.8s;animation-delay:.06s}
    @keyframes mpEq{0%,100%{height:2px}50%{height:14px}}
    #musicBtn{width:38px;height:38px;min-height:unset!important;border-radius:4px;background:var(--bg2);border:1px solid var(--line2);color:var(--t3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;box-shadow:0 4px 16px rgba(0,0,0,.5);overflow:hidden;position:relative}
    #musicBtn:hover{border-color:var(--line3,#484848);color:var(--t1);background:var(--bg3)}
    #musicBtn.playing{border-color:rgba(var(--em-rgb),.38);color:var(--em);background:rgba(var(--em-rgb),.08)}
    #musicBtn .mp-ico svg{width:15px;height:15px;display:block}
    #musicBtn.playing .mp-ico{display:none}
    #musicBtn.playing .mp-eq{display:flex}
    @media(max-width:680px){#musicPlayer{bottom:calc(1.15rem + env(safe-area-inset-bottom))!important;right:.85rem!important}#musicBtn{width:42px!important;height:42px!important;min-height:unset!important;border-radius:8px!important}#musicPanel{width:200px!important;border-radius:8px!important}.mp-nav{width:34px!important;height:34px!important;min-height:unset!important}}
  </style>
</head>
<body>

<div id="_gbg"></div>

<a class="back-btn" href="/topup" id="backBtn">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
  Kembali ke Top Up
</a>

<div class="card" id="mainCard">
  <div class="c-head">
    <div class="c-head-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <path d="M14 17h3m0 0h3m-3 0v-3m0 3v3"/>
      </svg>
    </div>
    <div>
      <div class="c-prod">Pembayaran Top Up</div>
      <div class="c-sub" id="cSubText">QRIS · Scan & bayar</div>
    </div>
  </div>

  <div class="c-body">

    <!-- Loading state -->
    <div id="loadingState">
      <div class="qr-section">
        <div class="qr-badge-row">
          <div class="qr-dot"></div>
          <div class="qr-badge">QRIS</div>
          <div class="qr-dot"></div>
        </div>
        <div class="qr-canvas-bg">
          <div class="qr-loader">
            <span class="spin"><span></span><span></span><span></span></span>
          </div>
        </div>
        <div class="amt-label">Total Pembayaran</div>
        <div class="amt-row"><span class="amt-rp">Rp</span><span class="amt-num skel" style="width:120px;height:2.2rem;display:inline-block">&nbsp;</span></div>
      </div>
      <div class="status-row">
        <div class="s-pulse"><span class="s-core"></span><span class="s-ring"></span></div>
        <span class="s-txt">Memuat data pembayaran...</span>
      </div>
    </div>

    <!-- QR & status (setelah data dimuat) -->
    <div id="payState" style="display:none">

      <div class="qr-section" id="dQrSection">
        <div class="qr-badge-row">
          <div class="qr-dot"></div>
          <div class="qr-badge">QRIS</div>
          <div class="qr-dot"></div>
        </div>
        <div class="qr-canvas-bg">
          <div class="qr-loader" id="dQrLoader">
            <span class="spin"><span></span><span></span><span></span></span>
          </div>
          <img id="dQrImg" src="" alt="QRIS" style="display:none;width:200px;height:200px;border-radius:4px">
        </div>
        <div class="amt-label">Total Pembayaran</div>
        <div class="amt-row"><span class="amt-rp">Rp</span><span class="amt-num" id="dAmtNum">—</span></div>
        <div class="fee-info" id="dFeeInfo" style="display:none"></div>
        <div id="dVariantBadge" style="display:none"><span class="variant-badge" id="dVariantText"></span></div>
      </div>

      <div class="status-wrap">
        <div class="status-row">
          <div class="s-pulse" id="dsPulse"><span class="s-core"></span><span class="s-ring"></span></div>
          <span class="s-txt" id="dsTxt">Menunggu pembayaran...</span>
        </div>
        <div class="timer-bar">
          <span>Batas waktu</span>
          <span class="timer-val" id="dTimer">--:--</span>
        </div>
      </div>

      <div class="dep-err" id="dErrBox"></div>
      <div class="success-box" id="dSuccessBox">
        <div class="suc-inner">
          <div class="suc-title">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            Transaksi Berhasil
          </div>
          <div id="dSucRows"></div>
        </div>
      </div>

      <div class="dep-actions-row" id="dActions">
        <button class="dep-check-btn" id="dCheckBtn" onclick="checkManual()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="12" height="12"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.86"/></svg>
          Cek
        </button>
        <button class="cancel-btn" id="dCancelBtn" onclick="doCancel()">Batalkan</button>
      </div>

      <button class="back-to-topup-btn" id="dBackBtn" onclick="window.location.href='/topup'">Top Up Lagi</button>

    </div>

  </div>
  <div class="c-foot">Pembayaran diverifikasi otomatis · Proses instan setelah lunas</div>
</div>

<!-- notif -->
<div class="notif" id="notif">
  <svg class="n-icon" id="notifIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
  <span class="n-msg" id="notifMsg"></span>
</div>

<script>
'use strict';

/* ── Params ─────────────────────────────────────────────────────── */
var _params  = new URLSearchParams(location.search);
var _orderId = (_params.get('orderId') || '').replace(/[^a-zA-Z0-9_\-]/g, '').slice(0, 64);

/* ── State ──────────────────────────────────────────────────────── */
var _poll = null;
var _cd   = null;
var _done = false;

/* ── Utils ──────────────────────────────────────────────────────── */
function idr(n) { return Number(n || 0).toLocaleString('id-ID'); }

var _nt = null;
function notify(msg, type) {
  var icons = {
    ok  : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>',
    err : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
    info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
  };
  var n = document.getElementById('notif');
  n.className = 'notif ' + (type || 'info');
  document.getElementById('notifIcon').innerHTML = icons[type] || icons.info;
  document.getElementById('notifMsg').textContent = msg;
  n.classList.add('show');
  clearTimeout(_nt);
  _nt = setTimeout(function() { n.classList.remove('show'); }, type === 'err' ? 3500 : 2200);
}

/* ── Countdown ──────────────────────────────────────────────────── */
function startCd(expiryAt) {
  if (_cd) clearInterval(_cd);
  function tick() {
    var left = Math.max(0, Math.floor((expiryAt - Date.now()) / 1000));
    var m = Math.floor(left / 60), s = left % 60;
    var el = document.getElementById('dTimer');
    if (!el) return;
    el.textContent = (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
    el.className = 'timer-val' + (left <= 60 ? ' red' : left <= 180 ? ' warn' : '');
    if (left === 0) clearInterval(_cd);
  }
  tick();
  _cd = setInterval(tick, 1000);
}

/* ── Show QR ────────────────────────────────────────────────────── */
function showQr(qrBase64) {
  var loader = document.getElementById('dQrLoader');
  var img    = document.getElementById('dQrImg');

  img._tried2 = false;
  img.style.display = 'none';
  loader.style.display = 'flex';
  loader.innerHTML = '<span class="spin"><span></span><span></span><span></span></span>';

  if (!qrBase64) {
    loader.innerHTML = '<span style="color:var(--t3);font-size:.62rem;text-align:center">QR tidak tersedia.<br>Hubungi admin.</span>';
    return;
  }

  img.onload = function() { loader.style.display = 'none'; img.style.display = ''; };
  img.onerror = function() {
    loader.innerHTML = '<div style="text-align:center;padding:.5rem">'
      + '<div style="color:var(--red);font-size:.62rem;margin-bottom:.35rem">QR gagal dimuat</div>'
      + '<button onclick="checkManual()" style="font-size:.6rem;padding:.25rem .6rem;background:var(--bg3);border:1px solid var(--line2);border-radius:4px;color:var(--t2);cursor:pointer;font-family:var(--font)">↻ Coba Lagi</button>'
      + '</div>';
  };
  img.src = qrBase64;
}

/* ── Render payment data ────────────────────────────────────────── */
function renderPayData(data) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('payState').style.display = 'block';

  document.getElementById('dAmtNum').textContent = idr(data.totalAmount || 0);

  if (data.fee && data.fee > 0) {
    var fi = document.getElementById('dFeeInfo');
    fi.textContent = 'Sudah termasuk biaya layanan Rp ' + idr(data.fee);
    fi.style.display = 'block';
  }

  if (data.variantName) {
    document.getElementById('dVariantText').textContent = data.variantName;
    document.getElementById('dVariantBadge').style.display = 'block';
    document.getElementById('cSubText').textContent = data.variantName + ' · QRIS';
  }

  showQr(data.qrBase64 || null);

  if (data.expiryAt) startCd(data.expiryAt);

  if (_poll) clearInterval(_poll);
  _poll = setInterval(doPoll, 5000);
}

/* ── Set status UI ──────────────────────────────────────────────── */
function setStatus(type, text) {
  var p = document.getElementById('dsPulse');
  var t = document.getElementById('dsTxt');
  p.className = 's-pulse ' + (type || '');
  t.className = 's-txt' + (type === 'ok' ? ' ok' : type === 'fail' ? ' fail' : type === 'processing' ? ' proc' : '');
  t.textContent = text;
}

/* ── Poll status ────────────────────────────────────────────────── */
async function doPoll() {
  if (!_orderId || _done) return;
  try {
    var r  = await fetch('/api/topup/pay/status/' + _orderId);
    var j  = await r.json();
    if (!j.ok) return;

    if (j.status === 'PENDING') {
      // Kalau QR belum tampil (misal reload), ambil dari response
      var img = document.getElementById('dQrImg');
      if (img && img.style.display === 'none' && j.qrBase64 && !img.src) showQr(j.qrBase64);
      setStatus('', 'Menunggu pembayaran...');
      return;
    }

    if (j.status === 'PROCESSING') {
      setStatus('processing', 'Pembayaran diterima — memproses order...');
      document.getElementById('dQrSection').style.opacity = '0.4';
      document.getElementById('dQrSection').style.pointerEvents = 'none';
      return;
    }

    if (j.status === 'SUCCESS') {
      clearInterval(_poll); _poll = null;
      clearInterval(_cd);   _cd   = null;
      _done = true;

      document.getElementById('dQrSection').style.display = 'none';
      document.getElementById('dActions').style.display = 'none';
      document.getElementById('dTimer').textContent = 'Lunas';
      document.getElementById('dTimer').className = 'timer-val';

      setStatus('ok', 'Pembayaran berhasil!');

      var rows = '';
      if (j.orderInvoice) rows += '<div class="suc-row"><span>Invoice</span><span>' + j.orderInvoice + '</span></div>';
      if (j.variantName)  rows += '<div class="suc-row"><span>Produk</span><span>' + j.variantName + '</span></div>';
      if (j.statusDesc)   rows += '<div class="suc-row"><span>Status</span><span style="color:var(--em)">' + j.statusDesc + '</span></div>';
      document.getElementById('dSucRows').innerHTML = rows;
      var sb = document.getElementById('dSuccessBox');
      sb.style.display = 'block';

      document.getElementById('dBackBtn').style.display = 'block';
      document.getElementById('dBackBtn').textContent = '⭐ Top Up Lagi';

      notify('Transaksi berhasil! Item segera masuk.', 'ok');
      return;
    }

    if (j.status === 'FAILED') {
      clearInterval(_poll); _poll = null;
      _done = true;
      setStatus('fail', j.message || 'Order gagal diproses.');
      var eb = document.getElementById('dErrBox');
      eb.textContent = j.message || 'Order gagal.';
      eb.style.display = 'block';
      document.getElementById('dActions').style.display = 'none';
      document.getElementById('dBackBtn').style.display = 'block';
      document.getElementById('dBackBtn').textContent = '↩ Coba Lagi';
      notify(j.message || 'Order gagal.', 'err');
      return;
    }

    if (j.status === 'EXPIRED') {
      clearInterval(_poll); _poll = null;
      _done = true;
      setStatus('dim', 'QRIS sudah kadaluarsa.');
      document.getElementById('dQrSection').style.opacity = '0.35';
      document.getElementById('dQrSection').style.pointerEvents = 'none';
      document.getElementById('dTimer').textContent = 'Habis';
      document.getElementById('dTimer').className = 'timer-val red';
      document.getElementById('dActions').style.display = 'none';
      document.getElementById('dBackBtn').style.display = 'block';
      document.getElementById('dBackBtn').textContent = '↩ Buat Order Baru';
      notify('QRIS kadaluarsa. Silakan buat order baru.', 'err');
      return;
    }

  } catch(e) { /* network err, coba lagi */ }
}

/* ── Manual check ───────────────────────────────────────────────── */
async function checkManual() {
  var btn = document.getElementById('dCheckBtn');
  if (btn) { btn.disabled = true; btn.textContent = '...'; }
  await doPoll();
  if (btn) {
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="12" height="12"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.86"/></svg> Cek';
  }
}

/* ── Cancel ─────────────────────────────────────────────────────── */
function doCancel() {
  if (!confirm('Batalkan pembayaran ini?')) return;
  clearInterval(_poll); _poll = null;
  clearInterval(_cd);   _cd   = null;
  _done = true;
  window.location.href = '/topup';
}

/* ── Background ─────────────────────────────────────────────────── */
function applyGlobalBg(s) {
  var old = document.getElementById('_gbg'); if (old) old.remove();
  var oldStyle = document.getElementById('_gbg_style'); if (oldStyle) oldStyle.remove();
  if (!s || !s.bgUrl) return;
  var op = s.bgOpacity != null ? parseFloat(s.bgOpacity) : 0.15;
  var el = document.createElement('div');
  el.id = '_gbg';
  el.setAttribute('aria-hidden', 'true');
  el.style.cssText = 'position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;will-change:transform;transform:translateZ(0)';
  if (s.bgType === 'video') {
    var v = document.createElement('video');
    v.src = s.bgUrl; v.autoplay = true; v.loop = true; v.muted = true; v.playsInline = true;
    v.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:' + op + ';transform:translateZ(0)';
    el.appendChild(v);
  } else {
    var d = document.createElement('div');
    d.style.cssText = 'position:absolute;inset:0;background-image:url(' + JSON.stringify(s.bgUrl) + ');background-size:cover;background-position:center;opacity:' + op + ';transform:translateZ(0)';
    el.appendChild(d);
  }
  document.body.insertBefore(el, document.body.firstChild);
  var st = document.createElement('style');
  st.id = '_gbg_style';
  st.textContent = 'html{background:var(--bg0,var(--bg,#181818))!important}body{background-color:transparent!important;background-image:none!important}';
  document.head.appendChild(st);
}

/* ── INIT ───────────────────────────────────────────────────────── */
(async function init() {
  // Load background + music
  try {
    var pr = await fetch('/api/products', { credentials: 'same-origin' });
    var pj = await pr.json();
    if (pj && pj.settings) { applyGlobalBg(pj.settings); applyMusicSettings(pj.settings); }
  } catch(e) {}

  if (!_orderId || !_orderId.startsWith('TU-')) {
    document.getElementById('loadingState').innerHTML = '<div style="text-align:center;padding:1.5rem;color:var(--t3);font-size:.72rem">Order tidak valid.<br><a href="/topup" style="color:var(--em);text-decoration:none">← Kembali ke Top Up</a></div>';
    return;
  }

  // Ambil data awal
  try {
    var r = await fetch('/api/topup/pay/status/' + _orderId);
    var j = await r.json();
    if (!j.ok) {
      document.getElementById('loadingState').innerHTML = '<div style="text-align:center;padding:1.5rem;color:var(--t3);font-size:.72rem">Order tidak ditemukan.<br><a href="/topup" style="color:var(--em);text-decoration:none">← Kembali ke Top Up</a></div>';
      return;
    }
    // Render QR + data
    renderPayData(j);
    // Langsung cek status juga
    await doPoll();
  } catch(e) {
    document.getElementById('loadingState').innerHTML = '<div style="text-align:center;padding:1.5rem;color:var(--red);font-size:.72rem">Gagal memuat data.<br><a href="/topup" style="color:var(--em);text-decoration:none">← Kembali ke Top Up</a></div>';
  }
})();

/* ── Block back saat masih aktif ─────────────────────────────────── */
history.pushState(null, '', location.href);
window.addEventListener('popstate', function() {
  if (!_done) history.pushState(null, '', location.href);
});

/* ── SSE settings update ─────────────────────────────────────────── */
(function connectSSE() {
  try {
    var src = new EventSource('/api/store/stream');
    src.onmessage = function(e) {
      try {
        var d = JSON.parse(e.data);
        if (d.type === 'settings_update' && d.settings) { applyGlobalBg(d.settings); applyMusicSettings(d.settings); }
      } catch(ex) {}
    };
    src.onerror = function() { src.close(); setTimeout(connectSSE, 5000); };
  } catch(ex) {}
})();
</script>

<!-- Music player (sama persis dengan payotp.html) -->
<script>
(function(){ var v='?v='+Date.now(); document.querySelectorAll('img[data-logo-img]').forEach(function(el){ if(el.src&&el.src.indexOf('/media/logo')>-1) el.src=el.src.split('?')[0]+v; }); var fav=document.querySelector('link[rel=icon]'); if(fav&&fav.href&&fav.href.indexOf('/media/logo')>-1) fav.href=fav.href.split('?')[0]+v; })();

var _music={playlist:[],idx:0,muted:false,vol:.35,ready:false,panelOpen:false,fadeTimer:null,endBound:false,gesturePending:false};
function initMusic(){try{_music.muted=localStorage.getItem('musicMuted')==='1';var sv=parseFloat(localStorage.getItem('musicVol'));if(!isNaN(sv)&&sv>=0&&sv<=1)_music.vol=sv;var si=parseInt(localStorage.getItem('musicIdx'),10);if(!isNaN(si)&&si>=0)_music.idx=si;}catch(e){}var volEl=document.getElementById('mpVol');if(volEl)volEl.value=Math.round(_music.vol*100);}
function applyMusicSettings(settings){var player=document.getElementById('musicPlayer');var audio=document.getElementById('bgMusic');if(!settings||!settings.musicUrl||!settings.musicEnabled){if(player)player.style.display='none';return;}audio.playsInline=true;audio.setAttribute('playsinline','');audio.setAttribute('webkit-playsinline','');var urls=settings.musicUrl.split(',').map(function(u){return u.trim();}).filter(Boolean).map(function(u){return /^https?:\/\//i.test(u)?u:location.origin+u;});if(!urls.length){if(player)player.style.display='none';return;}_music.playlist=urls;_music.idx=Math.min(_music.idx,urls.length-1);_music.ready=true;audio.loop=(urls.length===1);var prevBtn=document.getElementById('mpPrev');var nextBtn=document.getElementById('mpNext');if(prevBtn)prevBtn.style.display=urls.length>1?'':'none';if(nextBtn)nextBtn.style.display=urls.length>1?'':'none';if(player)player.style.display='flex';_musicLoad(_music.idx,false);_musicUpdateBtn();_musicUpdateTitle();if(!_music.endBound){_music.endBound=true;audio.addEventListener('ended',function(){if(_music.playlist.length>1){_music.idx=(_music.idx+1)%_music.playlist.length;try{localStorage.setItem('musicIdx',_music.idx);}catch(e){}_musicLoad(_music.idx,true);_musicUpdateTitle();}else{audio.currentTime=0;if(!_music.muted)audio.play().catch(function(){});}});}if(!_music.muted)_musicFadeIn();}
function _musicLoad(idx,autoPlay){var audio=document.getElementById('bgMusic');var url=_music.playlist[idx];audio.playsInline=true;if(audio.src!==url){audio.src=url;audio.load();}audio.volume=_music.muted?0:_music.vol;if(autoPlay&&!_music.muted)_musicFadeIn();}
function _musicFadeIn(){var audio=document.getElementById('bgMusic');if(!audio||!audio.src)return;clearInterval(_music.fadeTimer);audio.playsInline=true;audio.setAttribute('playsinline','');audio.volume=_music.vol;var p=audio.play();if(p&&p.catch)p.catch(function(e){_musicWaitForGesture();});}
function _musicWaitForGesture(){if(_music.gesturePending)return;_music.gesturePending=true;function onGesture(){_music.gesturePending=false;document.removeEventListener('touchstart',onGesture,true);document.removeEventListener('click',onGesture,true);if(!_music.muted&&_music.ready){var audio=document.getElementById('bgMusic');if(audio&&audio.paused)_musicFadeIn();}}document.addEventListener('touchstart',onGesture,{capture:true,once:true,passive:true});document.addEventListener('click',onGesture,{capture:true,once:true});}
function _musicFadeOut(cb){var audio=document.getElementById('bgMusic');if(!audio){if(cb)cb();return;}clearInterval(_music.fadeTimer);_music.fadeTimer=setInterval(function(){if(audio.volume>0.03){audio.volume=Math.max(0,audio.volume-0.04);}else{audio.volume=0;audio.pause();clearInterval(_music.fadeTimer);if(cb)cb();}},35);}
function toggleMusicPanel(){if(!_music.ready){toggleMusic();return;}var audio=document.getElementById('bgMusic');if(audio&&!_music.muted){audio.playsInline=true;audio.setAttribute('playsinline','');audio.setAttribute('webkit-playsinline','');if(audio.paused){if(!audio.src&&_music.playlist&&_music.playlist.length){audio.src=_music.playlist[_music.idx]||_music.playlist[0];audio.load();}audio.volume=_music.vol;audio.play().catch(function(e){});}}_music.panelOpen=!_music.panelOpen;var panel=document.getElementById('musicPanel');if(!panel)return;if(_music.panelOpen)panel.classList.add('open');else panel.classList.remove('open');_musicUpdateBtn();}
function toggleMusic(){if(!_music.ready)return;_music.muted=!_music.muted;try{localStorage.setItem('musicMuted',_music.muted?'1':'0');}catch(e){}if(_music.muted){_musicFadeOut();}else{var audio=document.getElementById('bgMusic');if(audio){audio.playsInline=true;audio.setAttribute('playsinline','');if(!audio.src&&_music.playlist&&_music.playlist.length){audio.src=_music.playlist[_music.idx]||_music.playlist[0];audio.load();}audio.volume=_music.vol;audio.play().catch(function(e){});}}_musicUpdateBtn();}
function musicNext(){if(!_music.playlist.length)return;var w=_music.muted;_musicFadeOut(function(){_music.idx=(_music.idx+1)%_music.playlist.length;try{localStorage.setItem('musicIdx',_music.idx);}catch(e){}_musicLoad(_music.idx,false);_musicUpdateTitle();if(!w)_musicFadeIn();});}
function musicPrev(){if(!_music.playlist.length)return;var w=_music.muted;_musicFadeOut(function(){_music.idx=(_music.idx-1+_music.playlist.length)%_music.playlist.length;try{localStorage.setItem('musicIdx',_music.idx);}catch(e){}_musicLoad(_music.idx,false);_musicUpdateTitle();if(!w)_musicFadeIn();});}
function musicSetVol(val){_music.vol=val/100;try{localStorage.setItem('musicVol',String(_music.vol));}catch(e){}var audio=document.getElementById('bgMusic');if(audio&&!_music.muted)audio.volume=_music.vol;}
function _musicUpdateBtn(){var btn=document.getElementById('musicBtn');if(!btn)return;if(_music.muted)btn.classList.remove('playing');else btn.classList.add('playing');var pp=document.getElementById('mpPlayPause');if(pp){if(_music.muted){pp.title='Play';pp.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>';}else{pp.title='Pause';pp.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="4" x2="6" y2="20"/><line x1="18" y1="4" x2="18" y2="20"/></svg>';}}}
function _musicUpdateTitle(){var el=document.getElementById('mpTitle');if(!el||!_music.playlist.length)return;var url=_music.playlist[_music.idx];var raw=url.split('?')[0].split('/').pop();var name=decodeURIComponent(raw).replace(/\.[^.]+$/,'').replace(/[-_]/g,' ')||('Track '+(_music.idx+1));var num=_music.playlist.length>1?(_music.idx+1)+'/'+_music.playlist.length+' · ':'';el.textContent='♪ '+num+name;el.title=name;}
document.addEventListener('click',function(e){if(!_music.panelOpen)return;var player=document.getElementById('musicPlayer');if(player&&!player.contains(e.target)){_music.panelOpen=false;var panel=document.getElementById('musicPanel');if(panel)panel.classList.remove('open');}});
</script>

<div id="musicPlayer">
  <div id="musicPanel">
    <div class="mp-title" id="mpTitle">&#9834; Musik</div>
    <div class="mp-controls">
      <button class="mp-nav" id="mpPrev" title="Sebelumnya" onclick="musicPrev()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="4" x2="5" y2="20"/></svg></button>
